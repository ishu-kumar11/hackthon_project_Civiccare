{% extends 'core/base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">

<section class="auth-page">
    <div class="auth-card">

        <h2>Welcome Back</h2>
        <p class="subtitle">Login to continue using CivicCare</p>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Username" required>
            
            <div class="password-box">
    <input type="password" name="password" id="password" placeholder="Password" required>

    <span class="toggle-password-btn" onclick="togglePassword()">
        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/>
            <circle cx="12" cy="12" r="3"/>
        </svg>

        <svg id="eyeSlashIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="display:none;">
            <path d="M3 3l18 18"/>
            <path d="M10.58 10.58A3 3 0 0 0 12 15a3 3 0 0 0 2.42-4.42"/>
            <path d="M9.88 5.09A10.94 10.94 0 0 1 12 5c6.5 0 10 7 10 7a18.4 18.4 0 0 1-4.2 5.4"/>
            <path d="M6.11 6.11C3.73 8 2 12 2 12s3.5 7 10 7a9.8 9.8 0 0 0 4.5-1.1"/>
        </svg>
    </span>
</div>



            <button type="submit">Login</button>
        </form>

        <p class="switch">
            Don’t have an account?
            <a href="{% url 'register' %}">Register</a>
        </p>

        <p class="switch">
             <a href="{% url 'password_reset' %}">Forgot Password?</a>
        </p>


    </div>
</section>

<script>
function togglePassword() {
    const passInput = document.getElementById("password");
    const eye = document.getElementById("eyeIcon");
    const eyeSlash = document.getElementById("eyeSlashIcon");

    if (passInput.type === "password") {
        passInput.type = "text";
        eye.style.display = "none";
        eyeSlash.style.display = "block";
    } else {
        passInput.type = "password";
        eye.style.display = "block";
        eyeSlash.style.display = "none";
    }
}
</script>


{% endblock %}
